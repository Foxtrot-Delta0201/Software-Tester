# Foci-Med Harness — Netlify deployment config
#
# Frontend (React/Vite) builds to frontend/dist/ and is served as a static site.
# All /api/* requests are proxied to the backend URL you configure via the
# VITE_API_URL environment variable in the Netlify dashboard.
#
# Setup checklist
# ───────────────
# 1. Deploy your FastAPI backend somewhere (Railway, Render, Fly.io, or locally
#    via ngrok for testing).
# 2. In Netlify: Site → Environment variables → add
#      VITE_API_URL = https://your-backend-url.com
# 3. Push this repo; Netlify runs `npm run build` inside frontend/ automatically.

[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback — every path that doesn't match a file returns index.html so
# React Router can handle client-side navigation.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Note: no server-side /api proxy here. The frontend calls the backend
# directly via VITE_API_URL (set it in Netlify → Environment variables).
# ":BACKEND_URL" is not valid Netlify env-substitution syntax so the proxy
# is left out. Set VITE_API_URL to your Railway/Render/Fly backend URL.
